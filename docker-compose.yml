services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: tido-api
    ports:
      - "8000:8000" 
    env_file:
      - ./api/.env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - tido_net
    restart: unless-stopped

  # Client Service (Next.js)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tido-client
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env
    depends_on:
      - api
    networks:
      - tido_net
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: tido_mongodb
    restart: always
    env_file:
      - ./api/.env    
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - ./docker_data/mongodb:/data/db
    networks: 
      - tido_net
      
  postgres:
    image: postgres:16-alpine
    container_name: tido_postgres
    restart: always
    env_file:
      - ./api/.env
    ports:
      - "5432:5432"
    volumes:
      - ./docker_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tido_net

networks:
  tido_net:
    driver: bridge
name: Deploy Tido

on:
  push:
    branches: [main]

env:
  REGISTRY: docker.io
  API_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tido-api
  CLIENT_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tido-client

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & Push API image
  # ──────────────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          build-args: |
            POSTGRES_URL=${{ secrets.POSTGRES_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Job 2: Build & Push Client image
  # ──────────────────────────────────────────────
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:latest
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Job 3: Deploy 
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build-api, build-client]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd app/Tido

            (
              echo "PORT=${{ secrets.PORT }}"
              echo "NODE_ENV=${{ secrets.NODE_ENV }}"
              echo "CLIENT_URL=${{ secrets.CLIENT_URL }}"
              echo ""
              echo "POSTGRES_URL=${{ secrets.POSTGRES_URL }}"
              echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
              echo "POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}"
              echo ""
              echo "MONGO_USER=${{ secrets.MONGO_USER }}"
              echo "MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}"
              echo ""
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}"
              echo ""
              echo "SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}"
              echo "SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}"
              echo "SEED_ADMIN_FULL_NAME=\"${{ secrets.SEED_ADMIN_FULL_NAME }}\""
              echo ""
              echo "CLIENT_ID=${{ secrets.CLIENT_ID }}"
              echo "CLIENT_SECRET=${{ secrets.CLIENT_SECRET }}"
              echo "CALLBACK_URL=${{ secrets.CALLBACK_URL }}"
              echo ""
              echo "DO_ENDPOINT=${{ secrets.DO_ENDPOINT }}"
              echo "DO_ACCESS_KEY=${{ secrets.DO_ACCESS_KEY }}"
              echo "DO_ACCESS_SECRET=${{ secrets.DO_ACCESS_SECRET }}"
              echo "DO_SPACES_REGION=${{ secrets.DO_SPACES_REGION }}"
              echo "DO_SPACES_BUCKET=${{ secrets.DO_SPACES_BUCKET }}"
              echo ""
              echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}"
              echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}"
              echo "NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}"
              echo "AUTH_TRUST_HOST=${{ secrets.AUTH_TRUST_HOST }}"
            ) > .env
            
            # Pull new images
            docker compose pull api client

            # Restart only api and client (keep DB)
            docker compose up -d api client

            docker exec tido-api sh -c "npx prisma migrate deploy && node dist/prisma/seed.js"

            # Clear old images
            docker images --format "{{.Repository}}:{{.Tag}}" | \
            grep "${{ env.API_IMAGE }}" | \
            grep -v "${{ github.sha }}" | \
            grep -v "latest" | \
            xargs -r docker rmi || true
            
            docker images --format "{{.Repository}}:{{.Tag}}" | \
            grep "${{ env.CLIENT_IMAGE }}" | \
            grep -v "${{ github.sha }}" | \
            grep -v "latest" | \
            xargs -r docker rmi || true